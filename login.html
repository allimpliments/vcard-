<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - vCard</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b,#334155);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .box{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
    .logo{text-align:center;font-size:28px;font-weight:800;color:#c9a84c;margin-bottom:10px}
    .logo span{color:#1e293b}
    h2{text-align:center;color:#1e293b;margin-bottom:25px;font-size:20px}
    input{width:100%;padding:14px;margin-bottom:12px;border:2px solid #e2e8f0;border-radius:12px;font-size:14px;transition:border 0.3s}
    input:focus{border-color:#c9a84c;outline:none}
    button{width:100%;padding:14px;background:linear-gradient(135deg,#c9a84c,#b8960f);color:#000;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;transition:all 0.3s}
    button:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(201,168,76,0.3)}
    p{text-align:center;margin-top:15px;color:#64748b;font-size:13px}
    a{color:#c9a84c;text-decoration:none;font-weight:600;cursor:pointer}
    a:hover{text-decoration:underline}
    .error{color:#ef4444;text-align:center;font-size:12px;display:none;margin-top:8px}
    .success{color:#10b981;text-align:center;font-size:12px;display:none;margin-top:8px}
    .divider{text-align:center;color:#94a3b8;font-size:12px;margin:15px 0;position:relative}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:#e2e8f0}
    .divider::before{left:0}.divider::after{right:0}
  </style>
</head>
<body>
<div class="box">
  <div class="logo">✦<span>vCard</span></div>
  <h2>Welcome Back</h2>
  
  <input type="email" id="login-email" placeholder="Email address">
  <input type="password" id="login-pass" placeholder="Password">
  <button onclick="login()">Login</button>
  
  <p class="error" id="login-error"></p>
  
  <div class="divider">or</div>
  
  <p><a onclick="resetPassword()">Forgot Password?</a></p>
  <p class="success" id="reset-msg"></p>
  
  <p style="margin-top:20px;">Don't have account? <a href="signup.html">Sign Up Free</a></p>
</div>

<script>
function login(){
  var email = document.getElementById('login-email').value.trim();
  var pass = document.getElementById('login-pass').value;
  var err = document.getElementById('login-error');
  
  if(!email || !pass){
    err.textContent = 'Please enter email and password';
    err.style.display = 'block';
    return;
  }
  
  firebase.auth().signInWithEmailAndPassword(email, pass)
  .then(function(){
    window.location.href = 'dashboard.html';
  })
  .catch(function(e){
    err.textContent = e.message;
    err.style.display = 'block';
  });
}

function resetPassword(){
  var email = document.getElementById('login-email').value.trim();
  var msg = document.getElementById('reset-msg');
  
  if(!email){
    alert('Please enter your email address first');
    return;
  }
  
  firebase.auth().sendPasswordResetEmail(email)
  .then(function(){
    msg.textContent = '✅ Password reset link sent to ' + email;
    msg.style.display = 'block';
  })
  .catch(function(e){
    msg.textContent = '❌ ' + e.message;
    msg.style.display = 'block';
    msg.style.color = '#ef4444';
  });
}
</script>
</body>
</html>
