<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Panel - vCard</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f1f5f9;padding:20px}
    .container{max-width:800px;margin:0 auto}
    .header{background:#fff;border-radius:16px;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);flex-wrap:wrap;gap:10px}
    .card{background:#fff;border-radius:16px;padding:25px;margin-bottom:15px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
    h2,h3{color:#1e293b}
    input,button,select{padding:12px 16px;border-radius:10px;border:1px solid #e2e8f0;font-size:14px;width:100%;margin-bottom:10px}
    button{background:#1a73e8;color:#fff;border:none;cursor:pointer;font-weight:600;transition:all 0.3s}
    button:hover{background:#1557b0}
    button.success{background:#10b981}
    button.success:hover{background:#059669}
    button.danger{background:#ef4444}
    button.danger:hover{background:#dc2626}
    table{width:100%;border-collapse:collapse;margin-top:15px}
    th,td{padding:10px;text-align:left;border-bottom:1px solid #e2e8f0;font-size:13px}
    th{background:#f8fafc;font-weight:600;color:#475569}
    .badge{padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
    .badge-paid{background:#d1fae5;color:#065f46}
    .badge-pending{background:#fef3c7;color:#92400e}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row input,.row select{flex:1;min-width:150px}
    .stat{text-align:center;padding:18px;background:#f8fafc;border-radius:14px;flex:1;min-width:110px}
    .stat .num{font-size:26px;font-weight:800;color:#1a73e8}
    .stat .label{font-size:11px;color:#64748b;margin-top:4px}
    .msg{padding:10px;border-radius:8px;font-size:12px;margin-top:8px}
    .msg-success{background:#d1fae5;color:#065f46}
    .msg-error{background:#fee2e2;color:#991b1b}
  </style>
</head>
<body>

<!-- Login -->
<div id="login-box" style="max-width:400px;margin:60px auto;background:#fff;border-radius:16px;padding:35px;box-shadow:0 4px 20px rgba(0,0,0,0.08);">
  <h2 style="text-align:center;">🤝 Agent Login</h2>
  <input type="email" id="login-email" placeholder="Agent Email">
  <input type="password" id="login-pass" placeholder="Password">
  <button onclick="agentLogin()" class="success" style="margin-top:5px;">Login</button>
  <p id="login-error" style="color:red;font-size:12px;text-align:center;display:none;margin-top:10px;"></p>
</div>

<!-- Dashboard -->
<div class="container" id="agent-panel" style="display:none;">
  <div class="header">
    <div>
      <h2>🤝 Agent Panel</h2>
      <span id="agent-info" style="font-size:12px;color:#64748b;"></span>
    </div>
    <button onclick="logout()" class="danger" style="width:auto;">Logout</button>
  </div>

  <!-- Stats -->
  <div style="display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap;">
    <div class="stat" style="flex:1;min-width:110px;"><div class="num" id="stat-total">0</div><div class="label">Total Clients</div></div>
    <div class="stat" style="flex:1;min-width:110px;"><div class="num" id="stat-paid">0</div><div class="label">Paid</div></div>
    <div class="stat" style="flex:1;min-width:110px;"><div class="num" id="stat-pending-count">0</div><div class="label">Pending</div></div>
    <div class="stat" style="flex:1;min-width:110px;"><div class="num" id="stat-comm">₹0</div><div class="label">Commission</div></div>
  </div>

  <!-- Create Client -->
  <div class="card">
    <h3>➕ Create New Client (Paid Plans Only)</h3>
    <div class="row">
      <input type="text" id="c-name" placeholder="Client Full Name *">
      <input type="email" id="c-email" placeholder="Client Email *">
    </div>
    <div class="row">
      <input type="text" id="c-phone" placeholder="Phone Number">
      <input type="password" id="c-pass" placeholder="Password (min 6 chars) *">
    </div>
    <div class="row">
      <select id="c-plan">
        <option value="">— Select Paid Plan —</option>
        <option value="single">Single Card - ₹699/yr (Comm: ₹70)</option>
        <option value="team">Small Team 5 Cards - ₹2,999/yr (Comm: ₹300)</option>
        <option value="startup">Startup 10 Cards - ₹4,999/yr (Comm: ₹500)</option>
        <option value="business">Business 30 Cards - ₹9,999/yr (Comm: ₹1,000)</option>
        <option value="enterprise">Enterprise 50 Cards - ₹14,999/yr (Comm: ₹1,500)</option>
      </select>
    </div>
    <button onclick="createClient()" class="success">🚀 Create Client & Send Payment Link</button>
    <div id="create-msg"></div>
  </div>

  <!-- My Clients -->
  <div class="card">
    <h3>📋 My Clients</h3>
    <button onclick="loadAgentClients()" style="width:auto;margin-bottom:10px;">🔄 Refresh</button>
    <table>
      <thead><tr><th>Client</th><th>Plan</th><th>Status</th><th>Commission</th><th>Date</th></tr></thead>
      <tbody id="agent-clients"><tr><td colspan="5">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
var currentAgent = null;
var agentData = null;
var commissions = { single: 70, team: 300, startup: 500, business: 1000, enterprise: 1500 };
var planPrices = { single: 699, team: 2999, startup: 4999, business: 9999, enterprise: 14999 };
var planLimits = { single: 1, team: 5, startup: 10, business: 30, enterprise: 50 };
var upiID = '8959592006@upi';

// Agent Login (Firebase Auth)
function agentLogin(){
  var email = document.getElementById('login-email').value.trim();
  var pass = document.getElementById('login-pass').value;
  var err = document.getElementById('login-error');
  
  if(!email || !pass){
    err.textContent = 'Enter email and password';
    err.style.display = 'block';
    return;
  }
  
  firebase.auth().signInWithEmailAndPassword(email, pass)
  .then(function(userCred){
    var user = userCred.user;
    // Check if user is agent
    return db.collection('users').doc(user.uid).get().then(function(doc){
      if(!doc.exists || doc.data().role !== 'agent'){
        err.textContent = 'Access denied! Agent only.';
        err.style.display = 'block';
        firebase.auth().signOut();
        return;
      }
      // Login successful
      currentAgent = user;
      agentData = doc.data();
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('agent-panel').style.display = 'block';
      document.getElementById('agent-info').textContent = (agentData.name || user.email) + ' | ' + user.email;
      loadAgentStats();
      loadAgentClients();
    });
  })
  .catch(function(e){
    err.textContent = e.message;
    err.style.display = 'block';
  });
}

function loadAgentStats(){
  if(!currentAgent) return;
  db.collection('agentClients').where('agentId','==',currentAgent.uid).get().then(function(snap){
    var total = snap.size;
    var paidCount = 0;
    var pendingCount = 0;
    var totalComm = 0;
    snap.forEach(function(doc){
      var d = doc.data();
      totalComm += d.commission || 0;
      if(d.status === 'paid') paidCount++;
      else pendingCount++;
    });
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-paid').textContent = paidCount;
    document.getElementById('stat-pending-count').textContent = pendingCount;
    document.getElementById('stat-comm').textContent = '₹' + totalComm;
  });
}

function loadAgentClients(){
  if(!currentAgent) return;
  var tbody = document.getElementById('agent-clients');
  tbody.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';
  
  db.collection('agentClients')
    .where('agentId','==',currentAgent.uid)
    .orderBy('createdAt','desc')
    .get()
    .then(function(snap){
      tbody.innerHTML = '';
      snap.forEach(function(doc){
        var d = doc.data();
        var badgeClass = d.status === 'paid' ? 'badge-paid' : 'badge-pending';
        var date = d.createdAt ? new Date(d.createdAt.toDate()).toLocaleDateString('en-IN') : '-';
        tbody.innerHTML += '<tr>'+
          '<td><b>'+d.clientName+'</b><br><small style="color:#64748b;">'+d.clientEmail+'</small></td>'+
          '<td>'+d.plan.toUpperCase()+'</td>'+
          '<td><span class="badge '+badgeClass+'">'+d.status.toUpperCase()+'</span></td>'+
          '<td style="font-weight:600;color:#10b981;">₹'+d.commission+'</td>'+
          '<td style="font-size:11px;color:#64748b;">'+date+'</td>'+
          '</tr>';
      });
      if(snap.empty) tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#64748b;">No clients yet.</td></tr>';
    });
}

async function createClient(){
  if(!currentAgent) return;
  var name = document.getElementById('c-name').value.trim();
  var email = document.getElementById('c-email').value.trim();
  var phone = document.getElementById('c-phone').value.trim();
  var pass = document.getElementById('c-pass').value;
  var plan = document.getElementById('c-plan').value;
  var msgDiv = document.getElementById('create-msg');
  
  if(!name || !email || !plan || pass.length < 6){
    msgDiv.innerHTML = '<div class="msg msg-error">❌ All fields required!</div>';
    return;
  }
  
  msgDiv.innerHTML = '<div class="msg">⏳ Creating client account...</div>';
  
  try {
    var userCred = await firebase.auth().createUserWithEmailAndPassword(email, pass);
    var uid = userCred.user.uid;
    
    await db.collection('users').doc(uid).set({
      name:name, email:email, phone:phone||'', plan:plan,
      cardLimit:planLimits[plan]||1, cards:0,
      createdBy:currentAgent.uid, createdByAgent:agentData?.name||'Agent',
      role:'client', createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    
    var slug = cleanSlug(name);
    if (!slug || slug.length < 2) {
      slug = name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/--+/g, '-').replace(/^-|-$/g, '');
    }
    if (!slug || slug.length < 2) {
      slug = 'client-' + Date.now();
    }
    var token = Math.random().toString(36).substring(2,10)+'@'+Math.random().toString(36).substring(2,6);
    
    await db.collection('cards').doc(slug).set({
      owner:uid, name:name, phone:phone||'', email:email,
      editToken:token, theme:'default', animation:'wave', status:'active',
      sectionOrder:["about","contact","social"],
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    
    await db.collection('agentClients').add({
      agentId:currentAgent.uid, agentName:agentData?.name||'Agent',
      clientId:uid, clientName:name, clientEmail:email,
      plan:plan, planPrice:planPrices[plan]||0,
      commission:commissions[plan]||0, status:'pending',
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    
    var pub = 'https://vcard.11avatardigitalhub.cloud/?id='+slug;
    var edit = 'https://vcard.11avatardigitalhub.cloud/edit.html?slug='+slug+'&token='+token;
    var upiUrl = 'upi://pay?pa='+upiID+'&pn=11Avatar&am='+planPrices[plan]+'.00&tn='+plan+'_Plan&cu=INR';
    
    msgDiv.innerHTML = '<div class="msg msg-success">✅ <b>Client Created!</b><br>'+
      '📧 '+email+' | 🔑 '+pass+' | 📦 '+plan.toUpperCase()+'<br>'+
      '📱 <a href="'+pub+'" target="_blank">Card</a> | ✏️ <a href="'+edit+'" target="_blank">Edit</a><br>'+
      '💳 <a href="'+upiUrl+'" target="_blank" style="color:#10b981;font-weight:700;">Payment Link (₹'+planPrices[plan]+')</a><br>'+
      '💰 Commission: ₹'+commissions[plan]+'</div>';
    
    document.getElementById('c-name').value='';
    document.getElementById('c-email').value='';
    document.getElementById('c-phone').value='';
    document.getElementById('c-pass').value='';
    document.getElementById('c-plan').value='';
    
    loadAgentStats();
    loadAgentClients();
  } catch(e){
    var errMsg = e.message;
    if(e.code==='auth/email-already-in-use') errMsg = 'Email already registered!';
    msgDiv.innerHTML = '<div class="msg msg-error">❌ '+errMsg+'</div>';
  }
}

function logout(){
  firebase.auth().signOut().then(function(){
    window.location.reload();
  });
}
</script>
</body>
</html>
