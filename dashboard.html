<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - vCard</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f1f5f9;min-height:100vh;padding:20px}
    .container{max-width:700px;margin:0 auto}
    .header{background:#fff;border-radius:16px;padding:20px 30px;display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
    .header button{background:#ef4444;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600}
    .card{background:#fff;border-radius:16px;padding:25px;margin-bottom:15px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
    h2{color:#1e293b}
    button.primary{background:#667eea;color:#fff;border:none;padding:12px 24px;border-radius:10px;font-weight:600;cursor:pointer;font-size:14px}
    button.primary:hover{background:#5a67d8}
    button.primary:disabled{background:#94a3b8;cursor:not-allowed}
    table{width:100%;border-collapse:collapse;margin-top:15px}
    th,td{padding:12px;text-align:left;border-bottom:1px solid #e2e8f0;font-size:13px}
    th{background:#f8fafc;font-weight:600}
    .limit-warning{background:#fef3c7;border:1px solid #f59e0b;border-radius:10px;padding:12px;margin:10px 0;font-size:13px;color:#92400e}
    .upi-btn{display:inline-block;padding:12px 20px;border-radius:12px;text-decoration:none;font-weight:700;font-size:14px;color:#fff;cursor:pointer;border:none;text-align:center;transition:all 0.3s}
    .upi-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.15)}
    .upi-phonepe{background:#5f259f}
    .upi-gpay{background:#1a73e8}
    .upi-paytm{background:#00baf2}
  </style>
</head>
<body>
<div class="container" id="dashboard" style="display:none;">
  <div class="header">
    <h2>👋 <span id="user-name"></span></h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h3>📇 My vCards</h3>
    <p style="color:#64748b;font-size:13px;margin:8px 0;">
      Plan: <b id="user-plan">Free</b> | 
      Cards Used: <b id="card-count">0</b> / <b id="card-limit">1</b>
    </p>
    <div id="limit-warning" class="limit-warning" style="display:none;">
      ⚠️ Free plan limit reached! <b>Upgrade to Pro</b> for more cards.
    </div>
    <button class="primary" id="create-btn" onclick="createCard()">+ Create New vCard</button>
    <p id="create-msg" style="font-size:12px;margin-top:8px;"></p>
    
    <table>
      <thead><tr><th>Card</th><th>Name</th><th>Links</th></tr></thead>
      <tbody id="card-list"><tr><td colspan="3">Loading...</td></tr></tbody>
    </table>
  </div>

  <div class="card">
    <h3>💳 Upgrade Plan</h3>
    <p style="color:#64748b;font-size:13px;margin:8px 0;">Choose a plan that fits your business</p>
    <button class="primary" onclick="payNow()" style="background:#10b981;margin-bottom:15px;">💰 Pay via UPI</button>
    <div id="pay-msg" style="font-size:12px;margin-top:8px;"></div>
  </div>
</div>

<div id="login-msg" style="text-align:center;padding:60px;font-size:18px;">🔐 Please <a href="login.html">Login</a></div>

<script>
var currentUser = null;
var userPlan = 'trial';
var cardLimit = 1;
var currentCards = 0;

firebase.auth().onAuthStateChanged(function(user){
  if(!user){
    document.getElementById('login-msg').style.display = 'block';
    return;
  }
  currentUser = user;
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('login-msg').style.display = 'none';
  document.getElementById('user-name').textContent = user.email || 'User';
  
  db.collection('users').doc(user.uid).get().then(function(doc){
    if(doc.exists){
      var d = doc.data();
      userPlan = d.plan || 'trial';
      var limits = {trial:1, single:1, team:5, startup:10, business:30, enterprise:50};
      cardLimit = limits[userPlan] || 1;
      document.getElementById('user-plan').textContent = userPlan.toUpperCase();
      document.getElementById('card-limit').textContent = cardLimit;
    }
    loadCards(user.uid);
  }).catch(function(e){
    console.error('User load error:', e);
    loadCards(user.uid);
  });
});

function loadCards(uid){
  var tbody = document.getElementById('card-list');
  db.collection('cards').where('owner','==',uid).get().then(function(snap){
    tbody.innerHTML = '';
    currentCards = snap.size;
    document.getElementById('card-count').textContent = currentCards;
    
    var btn = document.getElementById('create-btn');
    if(currentCards >= cardLimit){
      btn.disabled = true;
      btn.textContent = '🚫 Limit Reached';
      document.getElementById('limit-warning').style.display = 'block';
    } else {
      btn.disabled = false;
      btn.textContent = '+ Create New vCard';
      document.getElementById('limit-warning').style.display = 'none';
    }
    
    snap.forEach(function(doc){
      var d = doc.data();
      var pub = 'https://vcard.11avatardigitalhub.cloud/?id=' + doc.id;
      var edit = 'https://vcard.11avatardigitalhub.cloud/edit.html?slug=' + doc.id + '&token=' + (d.editToken || '');
      tbody.innerHTML += '<tr><td><b>'+doc.id+'</b></td><td>'+ (d.name||'-') +'</td><td><a href="'+pub+'" target="_blank">📱</a> <a href="'+edit+'" target="_blank">✏️</a></td></tr>';
    });
    if(snap.empty) tbody.innerHTML = '<tr><td colspan="3">No cards yet.</td></tr>';
  }).catch(function(e){
    tbody.innerHTML = '<tr><td colspan="3">Error loading cards</td></tr>';
    console.error(e);
  });
}

function createCard(){
  if(!currentUser) return;
  if(currentCards >= cardLimit){
    alert('🚫 Limit reached! Please upgrade your plan.');
    return;
  }
  
  var msg = document.getElementById('create-msg');
  msg.textContent = '⏳ Creating...';
  
  var slug = 'card-' + Date.now();
  var token = Math.random().toString(36).substring(2,10) + '@' + Math.random().toString(36).substring(2,6);
  
  db.collection('cards').doc(slug).set({
    owner: currentUser.uid,
    name: '',
    title: '',
    phone: '',
    email: currentUser.email || '',
    editToken: token,
    theme: 'default',
    sectionOrder: ["about","contact","social"],
    trialEnds: new Date(Date.now() + 3*24*60*60*1000).toISOString(),
    status: 'active',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){
    msg.innerHTML = '✅ Created! <a href="https://vcard.11avatardigitalhub.cloud/edit.html?slug='+slug+'&token='+token+'" target="_blank">Edit Card</a>';
    loadCards(currentUser.uid);
    return db.collection('users').doc(currentUser.uid).update({
      cards: firebase.firestore.FieldValue.increment(1)
    });
  }).catch(function(e){
    msg.textContent = '❌ Error: ' + e.message;
  });
}

function payNow(){
  var upiID = '8959592006@upi';
  var name = '11Avatar Digital Hub';
  var amount = '299.00';
  var note = 'vCard_Pro_Yearly';
  var upiUrl = 'upi://pay?pa=' + upiID + '&pn=' + encodeURIComponent(name) + '&am=' + amount + '&tn=' + note + '&cu=INR';
  
  var qr = document.getElementById('pay-msg');
  qr.innerHTML = '';
  qr.innerHTML += '<p style="font-weight:600;margin-bottom:8px;">📱 Scan QR Code to Pay</p>';
  qr.innerHTML += '<div id="upi-qr" style="display:inline-block;padding:15px;background:#fff;border-radius:15px;margin-bottom:8px;border:2px solid #e2e8f0;"></div>';
  qr.innerHTML += '<p style="color:#94a3b8;font-size:12px;margin:12px 0;">— or pay via —</p>';
  qr.innerHTML += '<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;">';
  qr.innerHTML += '<a href="'+upiUrl+'" target="_blank" rel="noopener" class="upi-btn upi-phonepe" style="flex:1;min-width:90px;">PhonePe</a>';
  qr.innerHTML += '<a href="'+upiUrl+'" target="_blank" rel="noopener" class="upi-btn upi-gpay" style="flex:1;min-width:90px;">GPay</a>';
  qr.innerHTML += '<a href="'+upiUrl+'" target="_blank" rel="noopener" class="upi-btn upi-paytm" style="flex:1;min-width:90px;">Paytm</a>';
  qr.innerHTML += '</div>';
  qr.innerHTML += '<p style="color:#64748b;font-size:11px;margin-top:8px;">UPI: <b>'+upiID+'</b> | After payment, contact admin.</p>';
  
  setTimeout(function(){
    var qrDiv = document.getElementById('upi-qr');
    if(qrDiv && typeof QRCode !== 'undefined'){
      qrDiv.innerHTML = '';
      new QRCode(qrDiv, { text: upiUrl, width: 150, height: 150, colorDark: '#1e293b', colorLight: '#ffffff' });
    }
  }, 300);
}

function logout(){
  firebase.auth().signOut().then(function(){
    window.location.href = 'login.html';
  });
}
</script>
</body>
</html>
