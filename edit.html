<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit vCard</title>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="edit-mode">
  <div id="editor-container" style="display:none;">
    <h2>✏️ अपना कार्ड एडिट करें</h2>
    <form id="edit-form">

      <label>नाम:</label><input type="text" id="e-name" required>
      <label>पद / टाइटल:</label><input type="text" id="e-title">
      <label>फ़ोन:</label><input type="tel" id="e-phone">
      <label>ईमेल:</label><input type="email" id="e-email">
      <label>वेबसाइट:</label><input type="url" id="e-website">

      <label>अबाउट (About):</label><textarea id="e-about" rows="3"></textarea>
      <label>About इमेज:</label>
      <input type="file" id="e-about-img-file" accept="image/*" style="padding: 8px; width: 100%;">
      <p style="font-size: 12px; color: #64748b; margin: 4px 0;">— या —</p>
      <input type="url" id="e-about-img" placeholder="या About इमेज URL डालें...">
      <img id="e-about-img-preview" src="" style="max-width: 100px; max-height: 100px; display: none; margin-top: 8px; border-radius: 10px;">

      <label>About PDF लिंक (वैकल्पिक):</label><input type="url" id="e-about-pdf" placeholder="https://... (PDF URL)">

      <label>प्रोफ़ाइल इमेज:</label>
      <input type="file" id="e-img-file" accept="image/*" style="padding: 8px; width: 100%;">
      <p style="font-size: 12px; color: #64748b; margin: 4px 0;">— या —</p>
      <input type="url" id="e-img" placeholder="या इमेज URL डालें...">
      <img id="e-img-preview" src="" style="max-width: 120px; max-height: 120px; display: none; margin-top: 8px; border-radius: 50%; object-fit: cover;">

      <label>QR कोड इमेज:</label>
      <input type="file" id="e-qr-file" accept="image/*" style="padding: 8px; width: 100%;">
      <p style="font-size: 12px; color: #64748b; margin: 4px 0;">— या —</p>
      <input type="url" id="e-qr" placeholder="या QR इमेज URL डालें (खाली छोड़ें तो ऑटो जनरेट होगा)...">
      <img id="e-qr-preview" src="" style="max-width: 100px; max-height: 100px; display: none; margin-top: 8px; border-radius: 10px;">

      <h3>सोशल लिंक्स</h3>
      <div id="social-links"></div>
      <button type="button" id="add-social">+ सोशल लिंक जोड़ें</button>

      <h3>थीम चुनें</h3>
      <select id="e-theme">
        <option value="default">डिफ़ॉल्ट (नीला)</option>
        <option value="healthcare">हेल्थकेयर (हरा)</option>
        <option value="saloon">सैलून (गुलाबी)</option>
        <option value="tech">टेक (बैंगनी)</option>
        <option value="dark">डार्क प्रीमियम</option>
        <option value="restaurant">रेस्टोरेंट (नारंगी)</option>
        <option value="realestate">रियल एस्टेट</option>
        <option value="education">एजुकेशन</option>
        <option value="wedding">वेडिंग</option>
      </select>

      <h3>सेक्शन का क्रम (Drag करके बदलें)</h3>
      <ul id="section-order">
        <li data-section="about">About</li>
        <li data-section="contact">Contact</li>
        <li data-section="social">Social Links</li>
        <li data-section="products">Online Shop</li>
        <li data-section="services">Products & Services</li>
        <li data-section="gallery">Gallery</li>
      </ul>
      <h3>🛍️ ऑनलाइन शॉप - प्रोडक्ट्स</h3>
      <div id="products-list"></div>
      <button type="button" id="add-product">+ प्रोडक्ट जोड़ें</button>
      <h3>📦 प्रोडक्ट्स & सर्विसेज़</h3>
      <div id="services-list"></div>
      <button type="button" id="add-service">+ सर्विस जोड़ें</button>
      <h3>🖼️ गैलरी</h3>
      <div id="gallery-list"></div>
      <button type="button" id="add-gallery">+ इमेज जोड़ें</button>
      <button type="submit">💾 सेव और पब्लिश करें</button>
    </form>
    <div id="publish-link" style="display:none;"></div>
  </div>
  <div id="access-denied" style="display:none;">⛔ अनधिकृत एक्सेस</div>
  <script src="js/editor.js"></script>
</body>
</html>
