<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>डिजिटल vCard</title>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div id="card-container" style="display:none;">
    <!-- Lottie Animation -->
    <div id="lottie-box">
      <div id="main-anim" style="width:100%; height:180px;"></div>
    </div>
    <!-- Profile Image -->
    <img id="profile-img" src="assets/default-user.png" alt="Profile" crossorigin="anonymous">
    <h1 id="name"></h1>
    <p id="title"></p>
        <!-- Action Buttons -->
    <div id="action-buttons" style="padding: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
      <a id="btn-call" href="#" style="flex: 1; min-width: 100px; padding: 14px 10px; background: #10b981; color: #fff; text-align: center; text-decoration: none; border-radius: 50px; font-weight: 600; font-size: 14px; box-shadow: 0 4px 15px rgba(16,185,129,0.3); transition: all 0.3s ease;">
        📞 Call
      </a>
      <a id="btn-email" href="#" style="flex: 1; min-width: 100px; padding: 14px 10px; background: #f59e0b; color: #fff; text-align: center; text-decoration: none; border-radius: 50px; font-weight: 600; font-size: 14px; box-shadow: 0 4px 15px rgba(245,158,11,0.3); transition: all 0.3s ease;">
        ✉️ Email
      </a>
      <a id="btn-whatsapp" href="#" target="_blank" style="flex: 1; min-width: 100px; padding: 14px 10px; background: #25d366; color: #fff; text-align: center; text-decoration: none; border-radius: 50px; font-weight: 600; font-size: 14px; box-shadow: 0 4px 15px rgba(37,211,102,0.3); transition: all 0.3s ease;">
        💬 WhatsApp
      </a>
    </div>
    <div id="sections-container"></div>
    <button id="save-contact">📇 Save to Phone</button>
    <div id="qr-box"></div>
  </div>
  <div id="loader">⏳ लोड हो रहा है...</div>
  <div id="error" style="display:none;">❌ कार्ड नहीं मिला</div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="js/viewer.js"></script>

</body>
</html>
