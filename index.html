<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>डिजिटल vCard</title>
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script>
  // Open Graph Thumbnail Fetcher
  async function fetchOGData(url, callback) {
    try {
      const response = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
      const html = await response.text();
      
      // Extract OG tags
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      
      const ogTitle = doc.querySelector('meta[property="og:title"]')?.getAttribute('content') || '';
      const ogImage = doc.querySelector('meta[property="og:image"]')?.getAttribute('content') || '';
      const ogDesc = doc.querySelector('meta[property="og:description"]')?.getAttribute('content') || '';
      
      callback({ title: ogTitle, image: ogImage, description: ogDesc });
    } catch (e) {
      console.log('OG fetch failed:', e);
      callback({ title: '', image: '', description: '' });
    }
  }
</script>
</head>
<body>
  <div id="card-container" style="display:none;">
    <!-- Lottie Animation -->
    <div id="lottie-box">
      <div id="main-anim" style="width:100%; height:180px;"></div>
    </div>
    <!-- Profile Image -->
    <img id="profile-img" src="assets/default-user.png" alt="Profile" crossorigin="anonymous">
    <h1 id="name"></h1>
    <p id="title"></p>
    <!-- Action Buttons -->
    <style>
      .action-btn {
        flex: 1;
        min-width: 100px;
        padding: 14px 10px;
        color: #fff;
        text-align: center;
        text-decoration: none;
        border-radius: 50px;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.3s ease;
        display: inline-block;
      }
      .action-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.25) !important;
      }
      .btn-call {
        background: #10b981;
        box-shadow: 0 4px 15px rgba(16,185,129,0.3);
      }
      .btn-call:hover {
        background: #059669;
        box-shadow: 0 8px 25px rgba(16,185,129,0.5) !important;
      }
      .btn-email {
        background: #f59e0b;
        box-shadow: 0 4px 15px rgba(245,158,11,0.3);
      }
      .btn-email:hover {
        background: #d97706;
        box-shadow: 0 8px 25px rgba(245,158,11,0.5) !important;
      }
      .btn-whatsapp {
        background: #25d366;
        box-shadow: 0 4px 15px rgba(37,211,102,0.3);
      }
      .btn-whatsapp:hover {
        background: #1da851;
        box-shadow: 0 8px 25px rgba(37,211,102,0.5) !important;
      }
    </style>
    <div id="action-buttons" style="padding: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
      <a id="btn-call" href="#" class="action-btn btn-call">📞 Call</a>
      <a id="btn-email" href="#" class="action-btn btn-email">✉️ Email</a>
      <a id="btn-whatsapp" href="#" target="_blank" class="action-btn btn-whatsapp">💬 WhatsApp</a>
    </div>
    <div id="sections-container"></div>
    <button id="save-contact">📇 Save to Phone</button>
        <!-- Share & PDF Buttons -->
    <div style="padding: 0 20px 10px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
      <button id="btn-share" style="flex: 1; min-width: 100px; padding: 12px 15px; background: #6366f1; color: #fff; border: none; border-radius: 50px; font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(99,102,241,0.3); transition: all 0.3s ease;"
        onmouseover="this.style.background='#4f46e5'; this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 25px rgba(99,102,241,0.5)';"
        onmouseout="this.style.background='#6366f1'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(99,102,241,0.3)';">
        📤 Share Card
      </button>
      <button id="btn-pdf" style="flex: 1; min-width: 100px; padding: 12px 15px; background: #ef4444; color: #fff; border: none; border-radius: 50px; font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(239,68,68,0.3); transition: all 0.3s ease;"
        onmouseover="this.style.background='#dc2626'; this.style.transform='translateY(-2px)'; this.style.boxShadow='0 8px 25px rgba(239,68,68,0.5)';"
        onmouseout="this.style.background='#ef4444'; this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(239,68,68,0.3)';">
        📄 Save as PDF
      </button>
    </div>
        <!-- QR Code Section -->
    <div id="qr-section" style="padding: 20px; text-align: center; border-top: 1px solid var(--border);">
      <h3 style="font-size: 16px; font-weight: 600; color: var(--primary); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px;">
        📱 Scan QR Code
      </h3>
      <div id="qr-box" style="display: inline-block; padding: 15px; background: #fff; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-bottom: 15px;">
        <!-- QR image uploaded by client -->
        <img id="qr-image" src="" alt="QR Code" style="display: none; width: 200px; height: 200px; object-fit: contain; margin: 0 auto;">
        <!-- Generated QR canvas -->
      </div>
      <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; word-break: break-all;">
        <span id="card-url-text"></span>
      </p>
      <button id="btn-copy-url" style="padding: 12px 25px; background: var(--primary); color: #fff; border: none; border-radius: 50px; font-size: 14px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(26,115,232,0.3); transition: all 0.3s ease;"
        onmouseover="this.style.background='var(--primary-hover)'; this.style.transform='translateY(-2px)';"
        onmouseout="this.style.background='var(--primary)'; this.style.transform='translateY(0)';">
        📋 Copy URL
      </button>
    </div>
  </div>
  <div id="loader">⏳ लोड हो रहा है...</div>
  <div id="error" style="display:none;">❌ कार्ड नहीं मिला</div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="js/viewer.js"></script>
  <script>
  // Cart functions
  let cart = [];
  function addToCart(name, price, img) {
    cart.push({ name, price, img });
    alert('✅ Product added to cart!\n\n' + name + '\n💰 ' + price);
    updateCartCount();
  }
  function updateCartCount() {
    const badge = document.getElementById('cart-count');
    if (badge) badge.textContent = cart.length;
  }
</script>
<!-- Lightbox -->
<div id="lightbox" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; text-align: center;">
  <span id="lightbox-close" style="position: absolute; top: 15px; right: 25px; color: #fff; font-size: 35px; font-weight: bold; cursor: pointer; z-index: 10000;">&times;</span>
  <button id="lightbox-prev" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.3); color: #fff; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 22px; cursor: pointer;">◀</button>
  <img id="lightbox-img" src="" style="max-width: 90%; max-height: 85%; margin-top: 40px; object-fit: contain; border-radius: 10px;">
  <button id="lightbox-next" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.3); color: #fff; border: none; border-radius: 50%; width: 45px; height: 45px; font-size: 22px; cursor: pointer;">▶</button>
</div>

<script>
  let lbImages = [];
  let lbIndex = 0;
  
  function openLightbox(images, index) {
    lbImages = images;
    lbIndex = index;
    document.getElementById('lightbox').style.display = 'block';
    document.getElementById('lightbox-img').src = lbImages[lbIndex];
    document.body.style.overflow = 'hidden';
  }
  
  document.getElementById('lightbox-close').onclick = function() {
    document.getElementById('lightbox').style.display = 'none';
    document.body.style.overflow = '';
  };
  
  document.getElementById('lightbox').onclick = function(e) {
    if (e.target === this) {
      this.style.display = 'none';
      document.body.style.overflow = '';
    }
  };
  
  document.getElementById('lightbox-next').onclick = function() {
    lbIndex = (lbIndex + 1) % lbImages.length;
    document.getElementById('lightbox-img').src = lbImages[lbIndex];
  };
  
  document.getElementById('lightbox-prev').onclick = function() {
    lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length;
    document.getElementById('lightbox-img').src = lbImages[lbIndex];
  };
</script>
</body>
</html>
