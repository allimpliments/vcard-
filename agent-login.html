<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Login</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .box{background:#fff;border-radius:20px;padding:35px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
    h2{text-align:center;color:#1e293b;margin-bottom:20px}
    input{width:100%;padding:14px;margin-bottom:12px;border:2px solid #e2e8f0;border-radius:12px;font-size:14px}
    input:focus{border-color:#10b981;outline:none}
    button{width:100%;padding:14px;background:#10b981;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer}
    button:hover{background:#059669}
    .error{color:#ef4444;text-align:center;font-size:12px;display:none}
  </style>
</head>
<body>
<div class="box">
  <h2>🤝 Agent Login</h2>
  <input type="email" id="agent-email" placeholder="Email">
  <input type="password" id="agent-pass" placeholder="Password">
  <button onclick="agentLogin()">Login</button>
  <p class="error" id="login-error"></p>
</div>

<script>
function agentLogin(){
  var email = document.getElementById('agent-email').value.trim();
  var pass = document.getElementById('agent-pass').value;
  var err = document.getElementById('login-error');
  
  if(!email || !pass){
    err.textContent = 'Enter email and password';
    err.style.display = 'block';
    return;
  }
  
  // Check agent collection
  db.collection('agent').where('Email','==',email).where('password','==',pass).get()
  .then(function(snap){
    if(snap.empty){
      err.textContent = 'Invalid credentials!';
      err.style.display = 'block';
      return;
    }
    // Save agent info to localStorage
    var agentDoc = snap.docs[0].data();
    localStorage.setItem('agentEmail', email);
    localStorage.setItem('agentName', agentDoc.Name || 'Agent');
    localStorage.setItem('agentCity', agentDoc.city || '');
    window.location.href = 'agent-dashboard.html';
  })
  .catch(function(e){
    err.textContent = e.message;
    err.style.display = 'block';
  });
}
</script>
</body>
</html>
