<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Booking Management</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f1f5f9;padding:20px}
    .container{max-width:1000px;margin:0 auto}
    .header{background:#fff;border-radius:16px;padding:20px 30px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,0.06);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
    h2{color:#1e293b}
    table{width:100%;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
    th,td{padding:12px;text-align:left;border-bottom:1px solid #e2e8f0;font-size:13px}
    th{background:#f8fafc;font-weight:700;color:#475569}
    .badge{padding:4px 10px;border-radius:12px;font-size:11px;font-weight:600}
    .badge-confirmed{background:#d1fae5;color:#065f46}
    .badge-cancelled{background:#fee2e2;color:#991b1b}
    button{padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:12px;color:#fff}
    .btn-cancel{background:#ef4444}
    .btn-cancel:hover{background:#dc2626}
    select,input{padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>📅 Appointment Bookings</h2>
    <div style="display:flex;gap:8px;align-items:center;">
      <select id="filter-card" onchange="loadBookings()" style="width:200px;">
        <option value="">All Cards</option>
      </select>
      <input type="password" id="admin-pass" placeholder="Password" style="width:150px;">
      <button onclick="login()" style="background:#667eea;">Login</button>
    </div>
  </div>

  <div id="panel" style="display:none;">
    <table>
      <thead><tr><th>Card</th><th>Customer</th><th>Phone</th><th>Service</th><th>Date</th><th>Time</th><th>Status</th><th>Action</th></tr></thead>
      <tbody id="booking-list"><tr><td colspan="8">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
var ADMIN_PASS = 'Admin@11Avatar';

function login(){
  var pass = document.getElementById('admin-pass').value;
  if(pass === ADMIN_PASS){
    document.getElementById('panel').style.display = 'block';
    loadCards();
  } else {
    alert('Wrong password!');
  }
}

function loadCards(){
  var select = document.getElementById('filter-card');
  db.collection('cards').orderBy('name').get().then(function(snap){
    select.innerHTML = '<option value="">All Cards</option>';
    snap.forEach(function(doc){
      var d = doc.data();
      select.innerHTML += '<option value="'+doc.id+'">'+(d.name||doc.id)+'</option>';
    });
    loadBookings();
  });
}

function loadBookings(){
  var tbody = document.getElementById('booking-list');
  tbody.innerHTML = '<tr><td colspan="8">Loading...</td></tr>';
  
  var cardFilter = document.getElementById('filter-card').value;
  
  var query = db.collection('cards');
  if(cardFilter){
    query = query.where(firebase.firestore.FieldPath.documentId(),'==',cardFilter);
  }
  
  query.get().then(function(snap){
    tbody.innerHTML = '';
    var found = false;
    
    snap.forEach(function(cardDoc){
      var cardData = cardDoc.data();
      var bookings = cardData.bookings || [];
      
      bookings.forEach(function(b, idx){
        found = true;
        var badge = b.status === 'cancelled' ? 'badge-cancelled' : 'badge-confirmed';
        var cancelBtn = b.status !== 'cancelled' ? 
          '<button class="btn-cancel" onclick="cancelBooking(\''+cardDoc.id+'\','+idx+')">Cancel</button>' : 
          '<span style="color:#94a3b8;font-size:11px;">Cancelled</span>';
        
        tbody.innerHTML += '<tr>'+
          '<td><b>'+(cardData.name||cardDoc.id)+'</b></td>'+
          '<td>'+(b.name||'-')+'</td>'+
          '<td>'+(b.phone||'-')+'</td>'+
          '<td>'+(b.serviceName||'-')+'</td>'+
          '<td>'+(b.date||'-')+'</td>'+
          '<td>'+(b.time||'-')+'</td>'+
          '<td><span class="badge '+badge+'">'+(b.status||'confirmed').toUpperCase()+'</span></td>'+
          '<td>'+cancelBtn+'</td>'+
          '</tr>';
      });
    });
    
    if(!found) tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#94a3b8;">No bookings found</td></tr>';
  });
}

async function cancelBooking(cardId, bookingIndex){
  if(!confirm('Cancel this booking?')) return;
  
  try {
    var cardRef = db.collection('cards').doc(cardId);
    var doc = await cardRef.get();
    var bookings = doc.data().bookings || [];
    
    if(bookings[bookingIndex]){
      bookings[bookingIndex].status = 'cancelled';
      await cardRef.update({bookings: bookings});
      alert('✅ Booking cancelled! Slot is now available.');
      loadBookings();
    }
  } catch(e){
    alert('Error: ' + e.message);
  }
}
</script>
</body>
</html>
