<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vCard Admin Panel</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#f1f5f9;padding:20px}
    #login-box,#admin-panel{max-width:900px;margin:0 auto;background:#fff;border-radius:16px;padding:30px;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
    h2{color:#1e293b;margin-bottom:20px}
    h3{color:#1e293b;margin-top:25px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e2e8f0}
    input,button,select{padding:12px 16px;border-radius:10px;border:1px solid #e2e8f0;font-size:14px;width:100%;margin-bottom:10px}
    button{background:#1a73e8;color:#fff;border:none;cursor:pointer;font-weight:600;transition:all 0.3s}
    button:hover{background:#1557b0}
    button.danger{background:#ef4444}
    button.danger:hover{background:#dc2626}
    button.success{background:#10b981}
    button.success:hover{background:#059669}
    button.warning{background:#f59e0b;color:#000}
    button.warning:hover{background:#d97706}
    table{width:100%;border-collapse:collapse;margin-top:15px}
    th,td{padding:10px;text-align:left;border-bottom:1px solid #e2e8f0;font-size:13px}
    th{background:#f8fafc;font-weight:600;color:#475569}
    .badge{padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
    .badge-trial{background:#dbeafe;color:#1e40af}
    .badge-single{background:#d1fae5;color:#065f46}
    .badge-team{background:#ede9fe;color:#5b21b6}
    .badge-startup{background:#fef3c7;color:#92400e}
    .badge-business{background:#e0e7ff;color:#3730a3}
    .badge-enterprise{background:#fce7f3;color:#9d174d}
    .badge-agent{background:#fef3c7;color:#92400e}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .row input{flex:1;min-width:200px}
    .msg{font-size:12px;margin-top:5px;padding:10px;border-radius:8px}
    .msg-success{background:#d1fae5;color:#065f46}
    .msg-error{background:#fee2e2;color:#991b1b}
  </style>
</head>
<body>

<!-- Login -->
<div id="login-box">
  <h2>🔐 Admin Login</h2>
  <input type="password" id="admin-pass" placeholder="Enter Admin Password">
  <button onclick="login()">Login</button>
  <p id="login-error" style="color:red;font-size:12px;display:none;">Wrong Password!</p>
</div>

<!-- Admin Panel -->
<div id="admin-panel" style="display:none;">
  <h2>🛠️ vCard Super Admin Panel</h2>

  <!-- ========== CREATE CLIENT ========== -->
  <h3>➕ Create New Client (with Email & Password)</h3>
  <div class="row">
    <input type="text" id="new-name" placeholder="Full Name *">
    <input type="email" id="new-email" placeholder="Email Address *">
  </div>
  <div class="row">
    <input type="text" id="new-phone" placeholder="Phone Number (optional)">
    <input type="password" id="new-pass" placeholder="Password (min 6 chars) *">
  </div>
  <select id="new-plan">
    <option value="trial">Free Trial (3 days, 1 card)</option>
    <option value="single">Single Card - ₹699/yr (1 card)</option>
    <option value="team">Small Team - ₹2,999/yr (5 cards)</option>
    <option value="startup">Startup - ₹4,999/yr (10 cards)</option>
    <option value="business">Business - ₹9,999/yr (30 cards)</option>
    <option value="enterprise">Enterprise - ₹14,999/yr (50 cards)</option>
  </select>
  <button onclick="createClient()" class="success">🚀 Create Client Account & Card</button>
  <p id="create-msg"></p>

  <!-- ========== CREATE AGENT ========== -->
  <h3>🤝 Create New Agent (One Click)</h3>
  <div class="row">
    <input type="text" id="agent-name" placeholder="Agent Full Name *">
    <input type="email" id="agent-email" placeholder="Agent Email *">
  </div>
  <div class="row">
    <input type="text" id="agent-phone" placeholder="Phone Number">
    <input type="password" id="agent-pass" placeholder="Password (min 6 chars) *">
  </div>
  <div class="row">
    <input type="text" id="agent-city" placeholder="City">
  </div>
  <button onclick="createAgent()" class="warning">🤝 Create Agent Account</button>
  <p id="agent-msg"></p>

  <!-- ========== ALL USERS ========== -->
  <h3>👥 All Users</h3>
  <button onclick="loadClients()" style="width:auto;padding:8px 16px;margin-bottom:10px;">🔄 Refresh Users</button>
  <table>
    <thead><tr><th>Email</th><th>Name</th><th>Phone</th><th>Plan/Role</th><th>Cards</th><th>Actions</th></tr></thead>
    <tbody id="client-table"><tr><td colspan="6">Loading...</td></tr></tbody>
  </table>

  <!-- ========== ALL CARDS ========== -->
  <h3>📇 All Cards</h3>
  <button onclick="loadAllCards()" style="width:auto;padding:8px 16px;margin-bottom:10px;">🔄 Refresh Cards</button>
  <table>
    <thead><tr><th>Slug</th><th>Name</th><th>Owner/Email</th><th>Created</th><th>Public Link</th><th>Actions</th></tr></thead>
    <tbody id="cards-table"><tr><td colspan="6">Loading...</td></tr></tbody>
  </table>
</div>

<script>
const ADMIN_PASS = 'Admin@11Avatar';
var planLimits = { 'trial': 1, 'single': 1, 'team': 5, 'startup': 10, 'business': 30, 'enterprise': 50 };
var commissions = { single: 70, team: 300, startup: 500, business: 1000, enterprise: 1500 };

function login(){
  var pass = document.getElementById('admin-pass').value;
  if(pass === ADMIN_PASS){
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    loadClients();
    loadAllCards();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function generateToken(){
  var chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  var t = '';
  for(var i=0;i<8;i++) t += chars.charAt(Math.floor(Math.random()*chars.length));
  t += '@';
  for(var j=0;j<4;j++) t += chars.charAt(Math.floor(Math.random()*chars.length));
  return t;
}

function cleanSlug(text){
  return text.toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,'-').replace(/--+/g,'-').replace(/^-|-$/g,'');
}

// ========== CREATE CLIENT ==========
async function createClient(){
  var name = document.getElementById('new-name').value.trim();
  var email = document.getElementById('new-email').value.trim();
  var phone = document.getElementById('new-phone').value.trim();
  var pass = document.getElementById('new-pass').value;
  var plan = document.getElementById('new-plan').value;
  var msg = document.getElementById('create-msg');
  
  if(!name || !email || pass.length < 6){
    msg.innerHTML = '<div class="msg msg-error">❌ Name, Email & Password (6+ chars) required!</div>';
    return;
  }
  
  msg.innerHTML = '<div class="msg">⏳ Creating account...</div>';
  
  try {
    var userCred = await firebase.auth().createUserWithEmailAndPassword(email, pass);
    var uid = userCred.user.uid;
    
    await db.collection('users').doc(uid).set({
      name: name, email: email, phone: phone || '',
      plan: plan, cardLimit: planLimits[plan] || 1, cards: 0, role: 'client',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    
        var slug = cleanSlug(name);
    if (!slug || slug.length < 2) {
      slug = name.toLowerCase().replace(/[^a-z0-9]/g, '-').replace(/--+/g, '-').replace(/^-|-$/g, '');
    }
    if (!slug || slug.length < 2) {
      slug = 'client-' + Date.now();
    }
    var token = generateToken();
    
    await db.collection('cards').doc(slug).set({
      owner: uid, name: name, phone: phone || '', email: email,
      editToken: token, theme: 'default', animation: 'wave', status: 'active',
      sectionOrder: ["about","contact","social","products","services","gallery","youtube","reels","payment","bank","feedback","location","contactform"],
      trialEnds: plan === 'trial' ? new Date(Date.now() + 3*24*60*60*1000).toISOString() : null,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    var pub = 'https://vcard.11avatardigitalhub.cloud/?id=' + slug;
    var edit = 'https://vcard.11avatardigitalhub.cloud/edit.html?slug=' + slug + '&token=' + token;
    
    msg.innerHTML = '<div class="msg msg-success">✅ Client Created!<br>📧 <b>'+email+'</b><br>🔑 <b>'+pass+'</b><br>📱 <a href="'+pub+'" target="_blank">Public Card</a><br>✏️ <a href="'+edit+'" target="_blank">Editor Link</a><br>🔐 Token: <b>'+token+'</b></div>';
    
    document.getElementById('new-name').value = '';
    document.getElementById('new-email').value = '';
    document.getElementById('new-phone').value = '';
    document.getElementById('new-pass').value = '';
    
    loadClients();
    loadAllCards();
  } catch(e){
    msg.innerHTML = '<div class="msg msg-error">❌ ' + e.message + '</div>';
  }
}

// ========== CREATE AGENT ==========
async function createAgent(){
  var name = document.getElementById('agent-name').value.trim();
  var email = document.getElementById('agent-email').value.trim();
  var phone = document.getElementById('agent-phone').value.trim();
  var pass = document.getElementById('agent-pass').value;
  var city = document.getElementById('agent-city').value.trim();
  var msg = document.getElementById('agent-msg');
  
  if(!name || !email || pass.length < 6){
    msg.innerHTML = '<div class="msg msg-error">❌ Name, Email & Password (6+ chars) required!</div>';
    return;
  }
  
  msg.innerHTML = '<div class="msg">⏳ Creating agent...</div>';
  
  try {
    // Save to agent collection
    await db.collection('agent').add({
      Name: name, Email: email, password: pass,
      'Phone no': phone || '', city: city || '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    // Create Firebase Auth account
    await firebase.auth().createUserWithEmailAndPassword(email, pass);
    
    // Save to users collection as agent
    var userCred = await firebase.auth().signInWithEmailAndPassword(email, pass);
    await db.collection('users').doc(userCred.user.uid).set({
      name: name, email: email, phone: phone || '',
      role: 'agent', plan: 'agent', cards: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    msg.innerHTML = '<div class="msg msg-success">✅ Agent Created!<br>📧 <b>'+email+'</b><br>🔑 <b>'+pass+'</b><br>🔗 Share Link: <b>/agent-login.html</b></div>';
    
    document.getElementById('agent-name').value = '';
    document.getElementById('agent-email').value = '';
    document.getElementById('agent-phone').value = '';
    document.getElementById('agent-pass').value = '';
    document.getElementById('agent-city').value = '';
    
    loadClients();
  } catch(e){
    msg.innerHTML = '<div class="msg msg-error">❌ ' + e.message + '</div>';
  }
}

// ========== LOAD USERS ==========
async function loadClients(){
  var tbody = document.getElementById('client-table');
  try {
    var snap = await db.collection('users').orderBy('createdAt','desc').get();
    tbody.innerHTML = '';
    snap.forEach(function(doc){
      var d = doc.data();
      var role = d.role || 'client';
      var plan = d.plan || 'trial';
      var displayPlan = role === 'agent' ? 'AGENT' : plan.toUpperCase();
      var badgeClass = role === 'agent' ? 'badge-agent' : 'badge-' + (plan === 'trial' ? 'trial' : 'single');
      tbody.innerHTML += '<tr>'+
        '<td>'+d.email+'</td>'+
        '<td>'+ (d.name||'-') +'</td>'+
        '<td>'+ (d.phone||'-') +'</td>'+
        '<td><span class="badge '+badgeClass+'">'+displayPlan+'</span></td>'+
        '<td>'+(d.cards||0)+' / '+(planLimits[plan]||'N/A')+'</td>'+
        '<td><button class="danger" onclick="deleteUser(\''+doc.id+'\',\''+d.email+'\')">🗑️</button></td>'+
        '</tr>';
    });
    if(snap.empty) tbody.innerHTML = '<tr><td colspan="6">No users yet</td></tr>';
  } catch(e){
    tbody.innerHTML = '<tr><td colspan="6">Error: '+e.message+'</td></tr>';
  }
}

// ========== LOAD CARDS ==========
async function loadAllCards(){
  var tbody = document.getElementById('cards-table');
  tbody.innerHTML = '<tr><td colspan="6">Loading...</td></tr>';
  try {
    var snap = await db.collection('cards').orderBy('createdAt','desc').limit(100).get();
    tbody.innerHTML = '';
    snap.forEach(function(doc){
      var d = doc.data();
      var pub = 'https://vcard.11avatardigitalhub.cloud/?id=' + doc.id;
      var created = d.createdAt ? new Date(d.createdAt.toDate()).toLocaleDateString('en-IN') : 'N/A';
      var owner = d.email || d.owner || 'Legacy';
      tbody.innerHTML += '<tr>'+
        '<td><b>'+doc.id+'</b></td>'+
        '<td>'+ (d.name||'-') +'</td>'+
        '<td>'+ owner +'</td>'+
        '<td>'+ created +'</td>'+
        '<td><a href="'+pub+'" target="_blank">📱 View</a></td>'+
        '<td><button class="danger" onclick="deleteCard(\''+doc.id+'\')">🗑️</button></td>'+
        '</tr>';
    });
    if(snap.empty) tbody.innerHTML = '<tr><td colspan="6">No cards found</td></tr>';
  } catch(e){
    tbody.innerHTML = '<tr><td colspan="6">Error: '+e.message+'</td></tr>';
  }
}

// ========== DELETE ==========
async function deleteCard(slug){
  if(!confirm('Delete card: ' + slug + '?')) return;
  await db.collection('cards').doc(slug).delete();
  alert('✅ Card deleted!');
  loadAllCards();
}

async function deleteUser(uid, email){
  if(!confirm('Delete user: ' + email + '?\n\nAll their cards will also be deleted.')) return;
  try {
    var snap = await db.collection('cards').where('owner','==',uid).get();
    var batch = db.batch();
    snap.forEach(function(doc){ batch.delete(doc.ref); });
    await batch.commit();
    await db.collection('users').doc(uid).delete();
    alert('✅ User and all cards deleted!');
    loadClients();
    loadAllCards();
  } catch(e){
    alert('Error: ' + e.message);
  }
}
</script>
</body>
</html>
